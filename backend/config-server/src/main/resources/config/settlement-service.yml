server:
  port: 8087

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payment_settlement_db
    username: root
    password: root

  kafka:
    bootstrap-servers: localhost:9092

  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"