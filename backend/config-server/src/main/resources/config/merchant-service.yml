server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payment_merchant_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"